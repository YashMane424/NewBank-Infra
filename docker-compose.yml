services:

  backend:
    build:
      context: https://github.com/YashMane424/NewBank.git
      dockerfile: Dockerfile
    container_name: newbank-backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH=${JWT_REFRESH}
      - DB_URL=${DATASOURCE_URL}
      - DB_USERNAME=${DATASOURCE_USERNAME}
      - DB_PASSWORD=${DATASOURCE_PASSWORD}
    networks:
      - newbank-net

  frontend:
    build:
      context: https://github.com/YashMane424/NewBank-UI.git
      dockerfile: Dockerfile
    container_name: newbank-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - newbank-net

networks:
  newbank-net:
    driver: bridge
